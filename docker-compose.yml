version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dona_pepa_db
    environment:
      POSTGRES_USER: dona_pepa_user
      POSTGRES_PASSWORD: dona_pepa_secure_password
      POSTGRES_DB: dona_pepa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dona_pepa_user -d dona_pepa"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: dona_pepa_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
